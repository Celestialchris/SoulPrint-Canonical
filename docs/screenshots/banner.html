<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoulPrint Banner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Forum&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1280px;
      height: 400px;
      background: #0e0f11;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .banner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .wordmark {
      font-family: "Forum", serif;
      font-size: 48px;
      font-weight: 400;
      color: rgba(240, 242, 238, 0.88);
      letter-spacing: 0.02em;
    }
    .tagline {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 18px;
      font-weight: 400;
      color: rgba(240, 242, 238, 0.55);
      text-align: center;
      max-width: 600px;
      line-height: 1.5;
    }
    .accent-line {
      width: 80px;
      height: 1px;
      background: #4ade80;
      margin: 4px 0;
    }
    .providers {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      color: rgba(240, 242, 238, 0.35);
      letter-spacing: 0.03em;
    }
    .providers .chatgpt { color: #4ade80; }
    .providers .claude { color: #a78bfa; }
    .providers .gemini { color: #60a5fa; }
  </style>
</head>
<body>
  <div class="banner">
    <div class="wordmark">SoulPrint</div>
    <div class="tagline">Your AI conversations are scattered everywhere. SoulPrint brings them home.</div>
    <div class="accent-line"></div>
    <div class="providers">
      <span class="chatgpt">ChatGPT</span> · <span class="claude">Claude</span> · <span class="gemini">Gemini</span> → one local archive
    </div>
  </div>
</body>
</html>
